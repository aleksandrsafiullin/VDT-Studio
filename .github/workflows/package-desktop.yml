name: Desktop Package
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  native-preflight:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm desktop:sidecar:prepare
      - run: pnpm desktop:verify
      - run: pnpm desktop:native:preflight
