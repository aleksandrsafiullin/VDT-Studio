name: Package
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  clean-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:alpha
      - run: pnpm release:bundle:verify
      - run: pnpm package:verify
