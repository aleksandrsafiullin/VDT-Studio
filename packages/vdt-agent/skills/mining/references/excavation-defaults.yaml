schema_version: 3
id: mining.excavation.defaults
skill_id: mining.excavation
version: 1
status: draft_reference_catalog
language: en-only
purpose: >-
  Deterministic fallback catalog for missing numeric leaf values in Mining
  Excavation VDT dialog questions. These values are suggestions for first-pass trees,
  not site standards and not measured performance.

usage_policy:
  load_policy: lazy_entry_lookup
  never_load_entire_catalog_into_prompt: true
  apply_only_when:
    - user_cannot_provide_value_now
    - user_requests_example_tree
    - demo_or_seed_tree_requires_numeric_placeholder
  never_apply_when:
    - site_actual_exists
    - client_model_value_exists
    - user_provided_value_exists
  when_used:
    assumption_status: default_assumption
    editable_in_dialog: true
    require_visible_range: true
    require_visible_source_tier: true
    confidence_default: low
  warning: >-
    Defaults are not mine standards, contractual assumptions, or replacements
    for dispatch, survey, chronometry, equipment passport, or mine planning data.

source_tier_order:
  - user_provided_value
  - site_actual_or_client_model_value
  - equipment_model_specific_value
  - material_specific_industry_default
  - generic_open_pit_excavation_default
  - unknown

units:
  time_hours: h
  loading_time: min/truck
  bucket_cycle_time: sec/bucket
  volume: m3
  solid_volume: solid_m3
  mass: t
  density: t/m3
  productivity_tonnes: t/h
  productivity_volume: solid_m3/h

fixed_constants:
  hours_per_day_24:
    value: 24
    unit: h/day
    source_tier: fixed_constant
    confidence: high
    applies_to_nodes: [hours_per_day_24]
  minutes_per_hour_60:
    value: 60
    unit: min/h
    source_tier: fixed_constant
    confidence: high
    applies_to_nodes: [minutes_per_hour_60]

default_tables:
  bucket_cycle_time_sec:
    description: Bucket cycle time by loading tool.
    source_tier: generic_open_pit_excavation_default
    confidence: low
    unit: sec/bucket
    applies_to_nodes:
      - bucket_cycle_time_sec
      - loading_movement_unloading_time_min
    entries:
      electric_rope_shovel:
        range: [29, 35]
        default: 32
      hydraulic_front_shovel:
        range: [25, 33]
        default: 29
      hydraulic_backhoe_shovel:
        range: [24, 32]
        default: 28
      hybrid_shovel:
        range: [25, 33]
        default: 29
      wheel_loader_blasted_face:
        range: [28, 50]
        default: 39
      unknown_mining_excavator:
        range: [25, 35]
        default: 30

  truck_loading_time_components_min:
    description: First-pass truck loading time components for one loaded truck.
    source_tier: generic_open_pit_excavation_default
    confidence: low
    unit: min/truck
    applies_to_nodes:
      - loading_movement_unloading_time_min
      - face_breakdown_ripping_time_min
      - truck_departure_arrival_time_min
      - relocation_time_min
      - truck_loading_time_min
    entries:
      loading_movement_unloading_time_min:
        formula: buckets_per_truck * bucket_cycle_time_sec / 60
        required_inputs: [buckets_per_truck, bucket_cycle_time_sec]
      face_breakdown_ripping_time_min:
        good_face_default: 0.0
        normal_default: 0.25
        hard_or_oversize_default: 1.0
      truck_departure_arrival_time_min:
        unconstrained_default: 0.5
        normal_default: 0.75
        constrained_default: 1.5
      relocation_time_min:
        normal_default: 0.0
        frequent_relocation_default: 0.25

  buckets_per_truck:
    description: Pass-match defaults used only for excavator productivity calculation.
    source_tier: generic_open_pit_excavation_default
    confidence: low
    unit: buckets/truck
    applies_to_nodes: [buckets_per_truck]
    recommended_range: [3, 6]
    entries:
      generic_open_pit_excavation_default:
        default: 5
        range: [3, 6]
      hydraulic_front_shovel:
        default: 5
        range: [3, 6]
      hydraulic_backhoe_shovel:
        default: 5
        range: [3, 6]
      electric_rope_shovel:
        default: 4
        range: [3, 6]
      large_hydraulic_shovel:
        default: 4
        range: [3, 6]
      wheel_loader:
        default: 4
        range: [3, 6]

  actual_bucket_fill_factor:
    description: Material-condition fill factor defaults for demo or first-pass VDTs.
    source_tier: material_specific_industry_default
    confidence: low
    unit: ratio
    applies_to_nodes: [actual_bucket_fill_factor]
    entries:
      well_blasted_rock:
        range: [0.80, 0.95]
        default: 0.875
      average_blasted_rock:
        range: [0.75, 0.90]
        default: 0.825
      poorly_blasted_rock:
        range: [0.60, 0.75]
        default: 0.675
      loose_mixed_moist_aggregates:
        range: [0.95, 1.00]
        default: 0.975
      coarse_loose_aggregate:
        range: [0.85, 0.90]
        default: 0.875
      rock_dirt_mixture:
        range: [1.00, 1.20]
        default: 1.10
      cemented_material:
        range: [0.85, 0.95]
        default: 0.90
      unknown_open_pit_ore_or_rock:
        range: [0.75, 0.90]
        default: 0.85

  swell_factor:
    description: Loose volume divided by bank volume. Divide loose bucket volume by swell factor to get solid volume.
    source_tier: material_specific_industry_default
    confidence: low
    unit: ratio_loose_to_bank
    applies_to_nodes:
      - swell_factor
      - ore_density_in_bucket_t_per_m3
      - rock_volume_per_bucket_in_solid_m3
    entries:
      basalt_or_hard_igneous:
        range: [1.64, 1.80]
        default: 1.70
      granite_or_hard_crystalline:
        range: [1.50, 1.86]
        default: 1.75
      limestone_blasted:
        range: [1.63, 1.75]
        default: 1.70
      sandstone:
        range: [1.39, 1.80]
        default: 1.60
      dolomite:
        range: [1.50, 1.67]
        default: 1.55
      shale_or_siltstone:
        range: [1.50, 1.61]
        default: 1.55
      gravel:
        range: [1.10, 1.15]
        default: 1.15
      sand:
        range: [1.10, 1.30]
        default: 1.20
      clay:
        range: [1.20, 1.40]
        default: 1.30
      unknown_blasted_ore:
        range: [1.45, 1.70]
        default: 1.60
      unknown_blasted_waste_rock:
        range: [1.50, 1.75]
        default: 1.65

  bank_density_t_per_m3:
    description: Bank density defaults. For ore tonnage, prefer site block model, survey, or lab density.
    source_tier: material_specific_industry_default
    confidence: low
    unit: t/m3
    applies_to_nodes:
      - ore_density_in_solid_t_per_m3
      - material_bank_density_t_per_m3
    entries:
      anthracite:
        range: [1.36, 1.55]
        default: 1.45
      bituminous_coal:
        range: [1.28, 1.35]
        default: 1.32
      lignite:
        range: [1.25, 1.25]
        default: 1.25
      copper_ore:
        range: [2.26, 2.26]
        default: 2.26
      iron_ore_hematite:
        range: [3.86, 5.16]
        default: 4.50
      iron_ore_taconite:
        range: [2.40, 3.20]
        default: 2.80
      bauxite:
        range: [1.40, 1.40]
        default: 1.40
      lead_zinc_ore:
        range: [3.50, 3.50]
        default: 3.50
      nickel_massive_sulphide:
        range: [3.60, 3.60]
        default: 3.60
      granite:
        range: [2.60, 2.80]
        default: 2.67
      basalt:
        range: [2.40, 3.10]
        default: 2.95
      sandstone:
        range: [2.30, 2.45]
        default: 2.38
      limestone:
        range: [2.60, 2.80]
        default: 2.65
      generic_waste_rock:
        range: [2.60, 2.80]
        default: 2.70

example_default_sets:
  average_blasted_ore_hydraulic_shovel:
    description: Example set for a first-pass ore productivity branch.
    source_tier: generic_open_pit_excavation_default
    confidence: low
    values:
      actual_bucket_fill_factor: 0.825
      swell_factor: 1.60
      bucket_cycle_time_sec: 29
      buckets_per_truck: 5
      truck_departure_arrival_time_min: 0.75
      face_breakdown_ripping_time_min: 0.25
      relocation_time_min: 0.0
  well_blasted_waste_rock_hydraulic_shovel:
    description: Example set for a first-pass rock productivity branch.
    source_tier: generic_open_pit_excavation_default
    confidence: low
    values:
      actual_bucket_fill_factor: 0.875
      swell_factor: 1.65
      bucket_cycle_time_sec: 29
      buckets_per_truck: 5
      truck_departure_arrival_time_min: 0.5
      face_breakdown_ripping_time_min: 0.0
      relocation_time_min: 0.0
  poorly_blasted_or_oversize_rock:
    description: Example set for poor fragmentation or oversize conditions.
    source_tier: generic_open_pit_excavation_default
    confidence: low
    values:
      actual_bucket_fill_factor: 0.675
      swell_factor: 1.70
      bucket_cycle_time_sec: 35
      buckets_per_truck: 5
      truck_departure_arrival_time_min: 1.0
      face_breakdown_ripping_time_min: 1.0
      relocation_time_min: 0.0

default_selection_rules:
  - node_id: actual_bucket_fill_factor
    preferred_inputs: [material_condition, fragmentation_condition]
    table: default_tables.actual_bucket_fill_factor.entries
    fallback_key: unknown_open_pit_ore_or_rock
  - node_id: swell_factor
    preferred_inputs: [material_type, material_condition]
    table: default_tables.swell_factor.entries
    fallback_keys_by_mode:
      ore: unknown_blasted_ore
      rock: unknown_blasted_waste_rock
  - node_id: ore_density_in_solid_t_per_m3
    preferred_inputs: [ore_type, material_type]
    table: default_tables.bank_density_t_per_m3.entries
    fallback_key: null
  - node_id: bucket_cycle_time_sec
    preferred_inputs: [equipment_type]
    table: default_tables.bucket_cycle_time_sec.entries
    fallback_key: unknown_mining_excavator
  - node_id: buckets_per_truck
    preferred_inputs: [equipment_type, truck_payload_t, bucket_payload_t]
    table: default_tables.buckets_per_truck.entries
    fallback_key: generic_open_pit_excavation_default


dialogue_fields:
  topology:
    - field_id: target_kpi_and_unit
      node_id: root
      input_type: enum
      options: [ore_excavation_t, rock_excavation_solid_m3, excavation_capacity, excavator_productivity, custom]
      required_before_topology_final: true
    - field_id: productivity_material_mode
      node_id: excavator_productivity
      input_type: enum
      options: [ore_tph, rock_solid_m3ph, separate_material_branches, custom]
      required_before_calculation: true
    - field_id: equipment_scope
      node_id: active_excavator_count
      input_type: multi_select_or_text
      required_before_calculation: false
    - field_id: split_logic
      node_id: total_excavation_output
      input_type: multi_select
      options: [none, equipment_class, material, pit, bench, block, operating_area, custom]
      required_before_topology_final: false
    - field_id: downtime_category_visibility
      node_id: downtime_per_excavator_h
      input_type: multi_select
      options:
        - scheduled_non_excavation_time_h
        - technical_downtime_h
        - technological_downtime_h
        - organizational_downtime_h
        - relocation_or_move_time_h
        - material_or_face_not_ready_time_h
        - drill_blast_waiting_or_restricted_access_time_h
        - operating_area_access_restriction_time_h
        - geotechnical_or_safety_restriction_time_h
        - other_downtime_h
      required_before_topology_final: false
      note: readiness and access limitations are downtime categories, not output caps.
  numeric_inputs:
    - field_id: active_excavator_count
      node_id: active_excavator_count
      unit: count
      input_type: number
      default_policy: no_industry_default
    - field_id: period_days
      node_id: period_days
      unit: days
      input_type: number
      default_policy: user_or_unknown
    - field_id: scheduled_non_excavation_time_h
      node_id: scheduled_non_excavation_time_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: technical_downtime_h
      node_id: technical_downtime_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: technological_downtime_h
      node_id: technological_downtime_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: organizational_downtime_h
      node_id: organizational_downtime_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: relocation_or_move_time_h
      node_id: relocation_or_move_time_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: material_or_face_not_ready_time_h
      node_id: material_or_face_not_ready_time_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: drill_blast_waiting_or_restricted_access_time_h
      node_id: drill_blast_waiting_or_restricted_access_time_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: operating_area_access_restriction_time_h
      node_id: operating_area_access_restriction_time_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: geotechnical_or_safety_restriction_time_h
      node_id: geotechnical_or_safety_restriction_time_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: other_downtime_h
      node_id: other_downtime_h
      unit: h
      input_type: number
      default_policy: user_or_unknown
    - field_id: truck_loading_time_components_min
      node_id: truck_loading_time_min
      unit: min/truck
      input_type: component_group
      default_table: default_tables.truck_loading_time_components_min
    - field_id: buckets_per_truck
      node_id: buckets_per_truck
      unit: buckets/truck
      input_type: number
      default_table: default_tables.buckets_per_truck
    - field_id: average_bucket_volume_m3
      node_id: average_bucket_volume_m3
      unit: m3
      input_type: number
      default_source: equipment-catalog.yaml.equipment_models
    - field_id: actual_bucket_fill_factor
      node_id: actual_bucket_fill_factor
      unit: ratio
      input_type: number
      default_table: default_tables.actual_bucket_fill_factor
    - field_id: swell_factor
      node_id: swell_factor
      unit: ratio_loose_to_bank
      input_type: number
      default_table: default_tables.swell_factor
    - field_id: ore_density_in_solid_t_per_m3
      node_id: ore_density_in_solid_t_per_m3
      unit: t/m3
      input_type: number
      default_table: default_tables.bank_density_t_per_m3

question_templates:
  topology_ready_message: >-
    The VDT topology is ready. I will now fill input KPI values through dialog.
  numeric_value_question: >-
    Input KPI: {node_id}. You can enter a custom value, use a suggested
    reference value if available, or leave it unknown for now.
  downtime_value_question: >-
    Input KPI: {node_id}. Enter downtime hours for this category, or leave it
    unknown. This skill does not use industry defaults for downtime.
  default_suggestion_suffix: >-
    If accepted, this value will be stored as default_assumption, not as a site fact.
