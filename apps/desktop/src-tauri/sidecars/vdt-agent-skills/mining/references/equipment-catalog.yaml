      payload_t: [290, 304]

pass_match_rules:
  preferred_formula: ceil(truck_payload_t / bucket_payload_t)
  fallback_when_bucket_payload_unknown: references/excavation-defaults.yaml#default_tables.buckets_per_truck
  avoid_partial_pass_in_first_pass_vdt: true
  do_not_model:
    - truck_queueing
    - truck_arrival_rate
    - truck_fleet_capacity
    - route_cycle_time
    - dispatch_matching

lookup_examples:
  cat_6020_average_bucket_volume_m3:
    user_mentions: [Cat 6020, CAT6020]
    returns:
      node_id: average_bucket_volume_m3
      value: 12.0
      unit: m3
      source_tier: equipment_model_specific_value
      assumption_status: default_assumption
  cat_6060_bucket_and_pass_context:
    user_mentions: [Cat 6060]
    returns:
      average_bucket_volume_m3: 34.0
      bucket_payload_t: 61.0
      typical_truck_match_text: about 4 passes with a 218-240 t truck class
