schema_version: 2
id: mining.excavation.equipment_catalog
skill_id: mining.excavation
version: 1
status: draft_reference_catalog
language: en-only
purpose: >-
  Equipment and truck examples used to suggest bucket volume, bucket payload,
  and pass-match context for Mining Excavation VDT dialog questions.

usage_policy:
  load_policy: lazy_entry_lookup
  never_load_entire_catalog_into_prompt: true
  apply_only_to_nodes:
    - average_bucket_volume_m3
    - bucket_payload_t
    - buckets_per_truck
    - truck_payload_t
  not_allowed_for:
    - proving_site_capacity
    - replacing_equipment_passport
    - building_haulage_vdt
    - truck_fleet_sizing
    - route_cycle_time
  when_used:
    assumption_status: default_assumption
    source_tier: equipment_model_specific_value
    editable_in_dialog: true
    confidence_default: medium

units:
  bucket_volume: m3
  bucket_payload: t
  truck_payload: t

equipment_types:
  hydraulic_front_shovel:
    display_name: Hydraulic front shovel
    default_bucket_cycle_lookup_key: hydraulic_front_shovel
    default_buckets_per_truck_lookup_key: hydraulic_front_shovel
  hydraulic_backhoe_shovel:
    display_name: Hydraulic backhoe shovel
    default_bucket_cycle_lookup_key: hydraulic_backhoe_shovel
    default_buckets_per_truck_lookup_key: hydraulic_backhoe_shovel
  electric_rope_shovel:
    display_name: Electric rope shovel
    default_bucket_cycle_lookup_key: electric_rope_shovel
    default_buckets_per_truck_lookup_key: electric_rope_shovel
  wheel_loader:
    display_name: Wheel loader
    default_bucket_cycle_lookup_key: wheel_loader_blasted_face
    default_buckets_per_truck_lookup_key: wheel_loader

