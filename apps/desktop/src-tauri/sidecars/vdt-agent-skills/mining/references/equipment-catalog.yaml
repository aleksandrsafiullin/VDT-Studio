    Truck payloads are used only to suggest buckets_per_truck or to build an
    example excavator productivity branch. They do not create a haulage VDT.
  models:
    belaz_7555:
      aliases: [BELAZ 7555, БелАЗ 7555]
      payload_t: [55, 60]
    belaz_7513:
      aliases: [BELAZ 7513, БелАЗ 7513]
      payload_t: [130, 140]
    belaz_75306:
      aliases: [BELAZ 75306, БелАЗ 75306]
      payload_t: 220
    cat_785:
      aliases: [Cat 785, Caterpillar 785, CAT785]
      payload_t: 147
    cat_789:
      aliases: [Cat 789, Caterpillar 789, CAT789]
      payload_t: 193
    cat_793:
      aliases: [Cat 793, Caterpillar 793, CAT793]
